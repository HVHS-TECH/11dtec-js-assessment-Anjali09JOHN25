<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Cafe name</title>
   <link rel="icon" type="image/png" href="croissant.png">
 <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>Cafe Menu</h1>

<!--Customer name form-->
<div id ="nameForm" class ="form">
  <div class = "form-content">
<h2>Welcome to cafe name</h2>
<label>Enter your name:</label>
<input type ="text" id="customerName" placeholder="Your name">

<button id ="startButton">Start Ordering</button>
  </div>
</div>

<!--Coffee customization form-->
<div id = "coffeeForm" class ="form">
  <div class = "form-content">
    <h2 id ="coffeeTitle">Coffee</h2>
    
    <label for ="milk">Milk</label>
    <select id ="milk">
    <option>Full Cream</option> 
     <option>Full Cream</option> 
    <option>Trim</option> 
    <option>Oat</option> 
    <option>Almond</option> 
    <option>Soy</option> 
    </select>

    <label for ="temperature">Temperature</label>
    <select id ="temperature">
    <option>Hot</option> 
    <option>Iced</option> 
    </select>

    <label for ="size">size</label>
    <select id ="size">
    <option value ="0">Small</option>
    <option value ="0.5">Medium (+$0.50)</option>
    <option value ="1">Large (+$1)</option>
    </select>

  <button id = addCartButton">
  Add to Cart
  </button>
  
  <button id = cancelButton">
  Cancel
  </button>
  
</div>

</div>

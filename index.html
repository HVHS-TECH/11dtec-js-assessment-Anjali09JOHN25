<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>The Coffee Shop</title>
   <link rel="icon" type="image/png" href="coffee-shop (1).png">
 <link rel="stylesheet" href="style.css">
</head>
<body>


<!--Customer name form-->
<div id ="nameForm" class ="form">
  <div class = "form-content">
<h2>Welcome to The Coffee Shop</h2>
<label>Please enter your name:</label>
<input type ="text" id="customerName" placeholder="Your name">

<p id="nameMessage"></p>

<button id ="startButton">Start Ordering</button>
  </div>
</div>

<header>
  <h1>☕The Coffee Shop☕</h1>
</header>

<div class = "container">
<section class ="menu">
    <h2>🍽️ Menu:</h2>
    <div id ="menuContainer">
    </div>
  </section>

  <aside class="cart">
    <h2>🛒 Your Cart:</h2>

    <div id="cartItems">
      <p>Your cart is currently empty</p>
    </div>

    <h3 id ="totalPrice">
      Total:$0.00
    </h3>
    
    <button id ="placeOrderButton">
      Place Order
    </button>
    <p id="cartMessage"></p>
  </aside>
</div>

<!--Coffee customization form-->
<div id = "coffeeForm" class ="form">
  <div class = "form-content">
    <h2 id ="coffeeTitle">Coffee</h2>
    
    <label for ="milk">Milk</label>
    <select id ="milk">
     <option>Full Cream</option> 
    <option>Trim</option> 
    <option>Oat</option> 
    <option>Almond</option> 
    <option>Soy</option> 
    <option>None</option> 
    </select>

    <label for ="temperature">Temperature</label>
    <select id ="temperature">
    <option>Hot</option> 
    <option>Iced</option> 
    </select>

    <label for ="syrup">Syrup</label>
    <select id ="syrup">
    <option value = "0">None</option>
    <option value = "0.5">Vanilla ($0.50)</option>
    <option value = "0.5">Caramel ($0.50)</option>
    <option value = "0.5">Hazelnut ($0.50)</option>
    <option value = "0.5">Chocolate ($0.50)</option>
    </select>

    <label for ="size">size</label>
    <select id ="size">
    <option value ="0">Small</option>
    <option value ="0.5">Medium (+$0.50)</option>
    <option value ="1">Large (+$1)</option>
    </select>

  <button id = "addCartButton">
  Add to Cart
  </button>
  
  <button id = "cancelButton">
  Cancel
  </button>
  
</div>
</div>

<!--Customer payment form-->
<div id = "paymentForm" class="form">
  <div class = "form-content">

    <h2>Payment</h2>
    <label for="paymentMethod">
      Payment Method 
    </label>
      <select id="paymentMethod">
      <option>Cash</option>
      <option>Card</option>
      <option>Apple Pay</option>
      </select>

    <label for="moneyGiven">
    Money Given ($)
    </label>

    <input
    type="number"
    id ="moneyGiven"
    min="0"
    step="0.01"
    >

  <p id="paymentMessage"></p>

    <button id = "confirmOrderButton">
      Confirm Order
    </button>

    <button id = "backtoCartButton">
      ⇦ Back to cart
    </button>
  </div>
</div>

<!--Customer receipt form-->
<div id="receiptForm" class="form">
  <div class ="form-content">
    <h2>Receipt</h2>

    <div id="receiptText">
  </div>

  <button id ="closeReceipt">
    Close
  </button>
  </div>
</div>


<script src ="script.js"></script>
</body>
</html>
